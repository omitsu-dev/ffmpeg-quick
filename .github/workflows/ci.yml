          node bin/ffmpeg-quick.js deinterlace test-input.mp4 -y
          node bin/ffmpeg-quick.js mute test-input.mp4 -s 0 -e 1 -y
          node bin/ffmpeg-quick.js text test-input.mp4 "Hello World" -y
