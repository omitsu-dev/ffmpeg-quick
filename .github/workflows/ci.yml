          node bin/ffmpeg-quick.js blend test.mp4 test.mp4 --dry-run
          node bin/ffmpeg-quick.js transpose test.mp4 --dry-run
          node bin/ffmpeg-quick.js video-info-overlay test.mp4 --dry-run
          node bin/ffmpeg-quick.js fade-between test.mp4 test.mp4 --dry-run
          node bin/ffmpeg-quick.js audio-lowpass test.mp4 --dry-run
          node bin/ffmpeg-quick.js audio-highpass test.mp4 --dry-run
          node bin/ffmpeg-quick.js delogo test.mp4 10:10:100:50 --dry-run
          node bin/ffmpeg-quick.js encode-prores test.mp4 --dry-run
          node bin/ffmpeg-quick.js thumbnail-strip test.mp4 --dry-run
          node bin/ffmpeg-quick.js audio-bandpass test.mp4 --dry-run
          node bin/ffmpeg-quick.js freeze-detect test.mp4 --dry-run
          node bin/ffmpeg-quick.js audio-stereo-widen test.mp4 --dry-run
          node bin/ffmpeg-quick.js audio-karaoke test.mp4 --dry-run
          node bin/ffmpeg-quick.js crop-detect test.mp4 --dry-run
          node bin/ffmpeg-quick.js gif-palette test.mp4 --dry-run
          node bin/ffmpeg-quick.js frame-step test.mp4 5 --dry-run
          node bin/ffmpeg-quick.js encode-dnxhd test.mp4 --dry-run
          node bin/ffmpeg-quick.js audio-bass-boost test.mp4 --dry-run
          node bin/ffmpeg-quick.js audio-treble-boost test.mp4 --dry-run
          node bin/ffmpeg-quick.js scene-cut test.mp4 --dry-run

      - name: Test real encode (compress a generated video)
        run: |
          ffmpeg -f lavfi -i testsrc=duration=2:size=320x240:rate=15 -c:v libx264 -pix_fmt yuv420p test-input.mp4
          ffmpeg -f lavfi -i testsrc=duration=1:size=160x120:rate=5 test-input-gif.gif
          node bin/ffmpeg-quick.js compress test-input.mp4 -y
          node bin/ffmpeg-quick.js trim test-input.mp4 -s 0 -d 1 -y
          node bin/ffmpeg-quick.js resize test-input.mp4 -w 160 -y
          node bin/ffmpeg-quick.js crop test-input.mp4 160x120 -y
          node bin/ffmpeg-quick.js gif test-input.mp4 -y
          node bin/ffmpeg-quick.js info test-input.mp4
          node bin/ffmpeg-quick.js rotate test-input.mp4 90 -y
          node bin/ffmpeg-quick.js reverse test-input.mp4 -y
          node bin/ffmpeg-quick.js fps test-input.mp4 10 -y
          node bin/ffmpeg-quick.js volume test-input.mp4 1.5 -y
          node bin/ffmpeg-quick.js fade test-input.mp4 --in 0.5 --out 0.5 --duration 2 -y
          node bin/ffmpeg-quick.js convert test-input.mp4 mkv -y
          node bin/ffmpeg-quick.js loop test-input.mp4 2 -y
          node bin/ffmpeg-quick.js snapshot test-input.mp4 --interval 1 -y
