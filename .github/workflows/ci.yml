          node bin/ffmpeg-quick.js blur test-input.mp4 -y
          node bin/ffmpeg-quick.js mirror test-input.mp4 -y
          node bin/ffmpeg-quick.js color test-input.mp4 --brightness 0.1 --saturation 1.5 -y
