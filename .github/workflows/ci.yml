          node bin/ffmpeg-quick.js chorus test.mp4 --dry-run
          node bin/ffmpeg-quick.js cinematic test.mp4 --dry-run
          node bin/ffmpeg-quick.js color-balance test.mp4 --rs 0.1 --dry-run
          node bin/ffmpeg-quick.js lut test.mp4 lut.cube --dry-run
          node bin/ffmpeg-quick.js channel-split test.mp4 --dry-run
          node bin/ffmpeg-quick.js histogram-overlay test.mp4 --dry-run
          node bin/ffmpeg-quick.js deblock test.mp4 --dry-run
          node bin/ffmpeg-quick.js audio-gate test.mp4 --dry-run
          node bin/ffmpeg-quick.js phaser test.mp4 --dry-run
          node bin/ffmpeg-quick.js flanger test.mp4 --dry-run
          node bin/ffmpeg-quick.js surround test.mp4 --dry-run
          node bin/ffmpeg-quick.js loudness-meter test.mp4 --dry-run
          node bin/ffmpeg-quick.js audio-reverse test.mp4 --dry-run
          node bin/ffmpeg-quick.js embed-thumbnail test.mp4 test.jpg --dry-run
          node bin/ffmpeg-quick.js interlace test.mp4 --dry-run
          node bin/ffmpeg-quick.js field-order test.mp4 tff --dry-run
          node bin/ffmpeg-quick.js censor test.mp4 -s 0 -e 1 --dry-run
          node bin/ffmpeg-quick.js encode-av1 test.mp4 --dry-run
          node bin/ffmpeg-quick.js segment test.mp4 10 --dry-run
          node bin/ffmpeg-quick.js thumbnail-grid test.mp4 --dry-run
          node bin/ffmpeg-quick.js audio-noise-reduce test.mp4 --dry-run
          node bin/ffmpeg-quick.js video-to-frames test.mp4 --dry-run
          node bin/ffmpeg-quick.js color-key test.mp4 bg.jpg --dry-run
          node bin/ffmpeg-quick.js tremolo test.mp4 --dry-run
          node bin/ffmpeg-quick.js vibrato test.mp4 --dry-run
          node bin/ffmpeg-quick.js deshake test.mp4 --dry-run
          node bin/ffmpeg-quick.js subtitle-burn test.mp4 subs.srt --dry-run
          node bin/ffmpeg-quick.js audio-speed test.mp4 1.5 --dry-run
          node bin/ffmpeg-quick.js encode-h265 test.mp4 --dry-run
          node bin/ffmpeg-quick.js silence-insert test.mp4 1 2 --dry-run
          node bin/ffmpeg-quick.js pip test.mp4 test.mp4 --dry-run
